version: "3.9"

services:
  # ────────────── Banco de Dados ──────────────
  db:
    image: postgres:16-alpine
    container_name: tjpe_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tjpe_archive
      POSTGRES_USER: tjpe
      POSTGRES_PASSWORD: tjpe_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tjpe -d tjpe_archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ────────────── Aplicação ──────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tjpe_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://tjpe:tjpe_secret@db:5432/tjpe_archive
      SESSION_SECRET: tjpe-arquivo-geral-secret-key-2026
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
