version: "3.9"

# ============================================================
# TJPE Archive Assist — Docker Compose PRODUÇÃO
# Uso: docker compose -f docker-compose.prod.yml --env-file .env up -d
# ============================================================

services:

  # ── Banco de Dados ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tjpe_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Porta NÃO exposta externamente em produção
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Aplicação Node.js ──────────────────────────────────
  app:
    image: tjpe-archive-assist:latest   # imagem gerada pelo pipeline CI/CD
    container_name: tjpe_app
    restart: always
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tjpe_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # certificados TLS gerenciados externamente
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
