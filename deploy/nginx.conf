# ============================================================
# Nginx — Reverse Proxy para TJPE Archive Assist
# Substitua "arquivo.tjpe.jus.br" pelo domínio real.
# ============================================================

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name arquivo.tjpe.jus.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS com proxy para a aplicação Node.js
server {
    listen 443 ssl http2;
    server_name arquivo.tjpe.jus.br;

    # ── TLS ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/arquivo.tjpe.jus.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arquivo.tjpe.jus.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Cabeçalhos de Segurança ───────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    # ── Limites ───────────────────────────────────────────
    client_max_body_size 10M;

    # ── Proxy para a aplicação ────────────────────────────
    location / {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Cache de assets estáticos ─────────────────────────
    location /assets/ {
        proxy_pass http://app:5000;
        expires    30d;
        add_header Cache-Control "public, immutable";
    }
}
